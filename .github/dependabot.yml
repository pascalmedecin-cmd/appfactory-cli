# Dependabot - surveillance hebdomadaire des dépendances (audit 360 V3b I-05 ;
# durci 2026-06-22, session refonte hygiène deps).
#
# Le CRM FilmPro (SvelteKit) vit dans le sous-dossier /CRM avec son propre
# package.json / package-lock.json. GitHub Actions vit dans /.github/workflows.
#
# DEUX LEÇONS gravées le 2026-06-22 (3 PR cassées sur 6, empilées 5 semaines) :
#
#   1. Le socle SvelteKit est FORTEMENT COUPLÉ : vite <-> vite-plugin-svelte
#      <-> @sveltejs/kit <-> svelte. Monter une moitié sans l'autre casse le
#      build (vite 8 exige le plugin 7 qui exige vite 8 -> ERESOLVE ; svelte
#      5.56 + plugin 6 -> TypeScript non strippé). On les GROUPE pour qu'ils
#      montent ensemble en UNE PR vérifiée par la CI.
#
#   2. SOCLE MIGRÉ vers vite 8 (rolldown) le 2026-06-28 : vite 8.1.0 +
#      vite-plugin-svelte 7.1.2 + @sveltejs/kit 2.68 + svelte 5.56.4 +
#      svelte-check 4.7.1 (build + check + test 2315 + npm ci VERTS). Le
#      « bug TS-stripping » de l'ancienne note 06-22 était un artefact de
#      RÉGÉN du lockfile (rm package-lock.json rehoiste des transitifs), PAS
#      vite 8 : sur un install propre et cohérent, le compilateur Svelte 5
#      natif strippe le TS sous rolldown. L'ERESOLVE venait du seul
#      vite-plugin-svelte-inspector (peer vite ^7), intégré dans vps 7 donc
#      disparu de l'arbre. Les ignore socle sont LEVÉS : Dependabot gère à
#      nouveau le socle via le groupe `sveltekit` ci-dessus, gaté par la CI.
#      RÈGLE DURE conservée : jamais « rm package-lock.json » pour bumper -
#      installs ciblés depuis le lockfile sain. typescript 6 (majeure) et
#      @supabase/* restent différés (raisons inchangées ci-dessous).
#      → mémoires project_fix_deps_ci_vercel_2026-06-22 + migration socle 06-28.
version: 2
updates:
  # Dépendances npm du CRM FilmPro
  - package-ecosystem: "npm"
    directory: "/CRM"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Socle SvelteKit : toujours en UNE PR (tous niveaux), jamais éclaté.
      sveltekit:
        patterns:
          - "vite"
          - "@sveltejs/*"
          - "svelte"
          - "svelte-check"
        update-types:
          - "major"
          - "minor"
          - "patch"
      # Le reste des minor + patch en une seule PR par run.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # --- Socle SvelteKit : ignore LEVÉ le 2026-06-28 (migration vite 8 /
      # rolldown livrée, cf. en-tête leçon 2). Dependabot gère à nouveau le
      # socle via le groupe `sveltekit` ci-dessus, gaté par la CI. ---
      # --- typescript 6 : majeure différée (erreurs de type à trier). ---
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # --- @supabase/* : bump 2.108 différé (typage strict + smoke auth requis). ---
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@supabase/ssr"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Actions GitHub utilisées par les workflows (cron veille, CI, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # Les bumps d'actions montent ensemble (checkout, setup-node, etc.).
      github-actions:
        patterns:
          - "*"
