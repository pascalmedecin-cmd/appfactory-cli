# Cron veille hebdomadaire FilmPro - exécuté hors Vercel pour s'affranchir
# du cap durée 300s (Hobby) qui a fait timeout le pipeline Anthropic streaming
# vendredi 01/05/2026 (W18 perdue) et vendredi 02/05/2026 (rerun manuel S166
# HTTP 504 FUNCTION_INVOCATION_TIMEOUT à 301.4s, preuve directe).
#
# Ce workflow remplace l'entrée /api/cron/intelligence du vercel.json (retirée
# en S167 Bloc #2). Le handler SvelteKit reste vivant pour rétro-compat /
# usage debug, juste plus déclenché automatiquement par Vercel.
#
# Cron principal : vendredi 06:27 UTC (08:27 Suisse l'été). Minute 27 et non 0 :
# le scheduler GitHub est saturé à l'heure pile (retards mesurés de 2-4h sur ce
# workflow entre le 08/05 et le 05/06/2026 avec '0 6'), GitHub recommande
# d'éviter le début d'heure.
# Cron rattrapage : vendredi 17:27 UTC, avec --only-if-absent. Filet anti-skip
# scheduler (le 12/06/2026, le run du matin n'était toujours pas parti à 09:00
# UTC) : ne tourne QUE si la semaine n'a aucune édition (ni published ni error).
# Si le run du matin a réussi → skip idempotent ; s'il a échoué → skip aussi
# (l'alerte email est déjà partie, pas de retry auto - décision council
# 2026-06-06). Coût du skip : 1 SELECT Supabase, zéro appel Anthropic.
# workflow_dispatch : permet à Pascal de re-lancer manuellement une semaine
# arbitraire (rattrapage W18, force-publish W19, etc.).
name: Cron veille hebdomadaire FilmPro

on:
  schedule:
    - cron: '27 6 * * 5'
    - cron: '27 17 * * 5'
  workflow_dispatch:
    inputs:
      week:
        description: "Semaine ISO à rattraper (format YYYY-Www, ex: 2026-W18). Vide = semaine en cours."
        required: false
        default: ''

# Sérialise les runs : si un run est en cours et qu'un workflow_dispatch
# manuel est lancé, le 2e attend la fin du 1er (pas d'écrasement de la
# ligne running concurrente, pas de double charge Anthropic).
concurrency:
  group: cron-veille
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-veille:
    runs-on: ubuntu-latest
    # Pipeline Anthropic streaming = 5-10 min en moyenne, jusqu'à 30 min en
    # cas de retry interne ou semaine très chargée. 30 min de marge confortable.
    timeout-minutes: 30
    # checkout/setup-node v6 : les actions v4 (Node 20) sont dépréciées et
    # forcées en Node 24 à partir du 16/06/2026 (warning officiel dans les logs
    # de runs). v6 tourne nativement sur Node 24.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: CRM/package-lock.json

      - name: Install dependencies
        working-directory: CRM
        run: npm ci

      - name: Run veille pipeline
        working-directory: CRM
        # Defense in depth contre les injections : `inputs.week` est passé via
        # variable d'environnement (pas via templating bash direct) puis
        # re-validé par regex stricte côté Node (`parseArgv` dans cli-args.ts).
        env:
          WEEK_INPUT: ${{ inputs.week }}
          # Expression cron qui a déclenché ce run (vide pour workflow_dispatch).
          # Sert à distinguer le run principal du rattrapage du soir.
          SCHEDULE_EXPR: ${{ github.event.schedule }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECAP_ENABLED: ${{ vars.EMAIL_RECAP_ENABLED || 'true' }}
          EMAIL_RECAP_TO: ${{ vars.EMAIL_RECAP_TO || 'pascal@filmpro.ch' }}
          EMAIL_RECAP_FROM: ${{ vars.EMAIL_RECAP_FROM || 'FilmPro Veille <noreply@filmpro.ch>' }}
          VEILLE_ANTI_DOUBLONS_FROM: ${{ vars.VEILLE_ANTI_DOUBLONS_FROM || '' }}
          VEILLE_WINDOW_DAYS: ${{ vars.VEILLE_WINDOW_DAYS || '30' }}
        run: |
          EXTRA=""
          if [ "$SCHEDULE_EXPR" = "27 17 * * 5" ]; then
            EXTRA="--only-if-absent"
          fi
          if [ -n "$WEEK_INPUT" ]; then
            npx tsx scripts/run-veille.ts --week "$WEEK_INPUT" $EXTRA
          else
            npx tsx scripts/run-veille.ts $EXTRA
          fi
