# Cron veille hebdomadaire FilmPro - exécuté hors Vercel pour s'affranchir
# du cap durée 300s (Hobby) qui a fait timeout le pipeline Anthropic streaming
# vendredi 01/05/2026 (W18 perdue) et vendredi 02/05/2026 (rerun manuel S166
# HTTP 504 FUNCTION_INVOCATION_TIMEOUT à 301.4s, preuve directe).
#
# Ce workflow remplace l'entrée /api/cron/intelligence du vercel.json (retirée
# en S167 Bloc #2). Le handler SvelteKit reste vivant pour rétro-compat /
# usage debug, juste plus déclenché automatiquement par Vercel.
#
# Cron principal : vendredi 02:27 UTC (04:27 Suisse l'été). Avancé de 06:27 à
# 02:27 UTC le 2026-06-26 (décision Pascal) : le scheduler GitHub décale ce
# workflow de 2-4h en pratique (ex. 26/06 : prévu 06:27, parti 09:54). En visant
# 04:27 Suisse, le retard habituel fait atterrir le brief le matin (~06-08h Suisse)
# au lieu de midi/soir. Minute 27 et non 0 : le scheduler GitHub est saturé à
# l'heure pile (retards mesurés de 2-4h avec '0 6' entre le 08/05 et le 05/06/2026),
# GitHub recommande d'éviter le début d'heure.
# Cron rattrapage : vendredi 17:27 UTC. Filet anti-skip scheduler (le 12/06/2026,
# le run du matin n'était toujours pas parti à 09:00 UTC) ET retry des échecs
# (décision Pascal 2026-06-19, renverse le council 06-06) : si le run du matin a
# réussi → skip idempotent (1 SELECT Supabase, zéro appel Anthropic) ; s'il a
# échoué OU n'a pas tourné → RETENTE. L'alerte email du matin est déjà partie
# (aucun masquage de dérive) ; coût marginal et rare grâce au fix racine
# débordement + résilience par-item (2026-06-19). La garde idempotente
# « déjà published » côté run-generation suffit, le flag --only-if-absent est retiré.
# workflow_dispatch : permet à Pascal de re-lancer manuellement une semaine
# arbitraire (rattrapage W18, force-publish W19, etc.).
name: Cron veille hebdomadaire FilmPro

on:
  schedule:
    - cron: '27 2 * * 5'
    - cron: '27 17 * * 5'
  workflow_dispatch:
    inputs:
      week:
        description: "Semaine ISO à rattraper (format YYYY-Www, ex: 2026-W18). Vide = semaine en cours."
        required: false
        default: ''
      force:
        description: "Forcer la régénération même si l'édition est déjà publiée (rattrapage d'une édition ratée)."
        required: false
        type: boolean
        default: false
      no_email:
        description: "Supprimer tout envoi d'email (backfill silencieux d'une semaine passée)."
        required: false
        type: boolean
        default: false

# Sérialise les runs : si un run est en cours et qu'un workflow_dispatch
# manuel est lancé, le 2e attend la fin du 1er (pas d'écrasement de la
# ligne running concurrente, pas de double charge Anthropic).
concurrency:
  group: cron-veille
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-veille:
    runs-on: ubuntu-latest
    # Pipeline Anthropic streaming = 5-10 min en moyenne, jusqu'à 30 min en
    # cas de retry interne ou semaine très chargée. 30 min de marge confortable.
    timeout-minutes: 30
    # checkout v7 / setup-node v6 : les actions v4 (Node 20) sont dépréciées et
    # forcées en Node 24 à partir du 16/06/2026 (warning officiel dans les logs
    # de runs). v6/v7 tournent nativement sur Node 24.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: CRM/package-lock.json

      - name: Install dependencies
        working-directory: CRM
        run: npm ci

      - name: Run veille pipeline
        working-directory: CRM
        # Defense in depth contre les injections : `inputs.week` / `inputs.force` sont
        # passés via variable d'environnement (pas via templating bash direct) puis
        # construits dans un tableau bash (quoting préservé, pas de word-splitting) et
        # re-validés par regex stricte côté Node (`parseArgv` dans cli-args.ts).
        env:
          WEEK_INPUT: ${{ inputs.week }}
          FORCE_INPUT: ${{ inputs.force }}
          NO_EMAIL_INPUT: ${{ inputs.no_email }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECAP_ENABLED: ${{ vars.EMAIL_RECAP_ENABLED || 'true' }}
          EMAIL_RECAP_TO: ${{ vars.EMAIL_RECAP_TO || 'pascal@filmpro.ch' }}
          EMAIL_RECAP_FROM: ${{ vars.EMAIL_RECAP_FROM || 'FilmPro Veille <noreply@filmpro.ch>' }}
          EMAIL_BRIEF_ENABLED: ${{ vars.EMAIL_BRIEF_ENABLED || 'true' }}
          EMAIL_BRIEF_TO: ${{ vars.EMAIL_BRIEF_TO || 'pascal@filmpro.ch,antoine@filmpro.ch' }}
          EMAIL_BRIEF_FROM: ${{ vars.EMAIL_BRIEF_FROM || 'FilmPro Veille <noreply@filmpro.ch>' }}
          VEILLE_ANTI_DOUBLONS_FROM: ${{ vars.VEILLE_ANTI_DOUBLONS_FROM || '' }}
          VEILLE_WINDOW_DAYS: ${{ vars.VEILLE_WINDOW_DAYS || '30' }}
        run: |
          ARGS=()
          if [ -n "$WEEK_INPUT" ]; then
            ARGS+=(--week "$WEEK_INPUT")
          fi
          if [ "$FORCE_INPUT" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ "$NO_EMAIL_INPUT" = "true" ]; then
            ARGS+=(--no-email)
          fi
          npx tsx scripts/run-veille.ts "${ARGS[@]}"
