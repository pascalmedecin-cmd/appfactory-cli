# project.yaml : Configuration specifique client
# Ce fichier centralise tout ce qui est propre a un deploiement client.
# Le template SvelteKit lit cette config pour adapter scoring, sources, pipeline, etc.

app:
  name: FilmPro CRM
  slug: filmpro
  description: CRM de gestion commerciale pour le secteur de la production audiovisuelle et construction
  locale: fr-CH

branding:
  primary: "#2F5A9E"
  primary_light: "#F0F4F8"
  primary_dark: "#0A1628"
  accent: "#3B6CB7"
  logo: FilmPro_logo.svg
  logo_white: FilmPro_logo_white.svg
  font: DM Sans

auth:
  provider: google
  # Seuls les emails de ces domaines peuvent se connecter
  allowed_domains: []

# Colonnes du pipeline commercial (ordre = affichage gauche a droite)
pipeline:
  etapes:
    - key: identification
      label: Identification
      icon: search
      color: text-text-muted
    - key: qualification
      label: Qualification
      icon: fact_check
      color: text-primary
    - key: proposition
      label: Proposition
      icon: description
      color: text-accent
    - key: negociation
      label: Negociation
      icon: handshake
      color: text-warning
    - key: gagne
      label: Gagne
      icon: emoji_events
      color: text-success
    - key: perdu
      label: Perdu
      icon: block
      color: text-danger

# Configuration du scoring des leads de prospection
scoring:
  max_points: 12

  cantons_prioritaires:
    points: 2
    values: [GE, VD, VS]

  cantons_secondaires:
    points: 1
    values: [NE, FR, JU]

  entreprise_identifiee:
    points: 1
    sources: [zefix]

  secteurs_cibles:
    points: 3
    keywords:
      - construction
      - architecte
      - architecture
      - hvac
      - chauffage
      - ventilation
      - climatisation
      - regie
      - facility
      - batiment
      - menuiserie
      - charpente
      - electricite
      - plomberie
      - peinture
      - renovation
      - genie civil
      - bureau technique
      - ingenieur

  sources_chaudes:
    points: 2
    values: [simap, sitg]

  recence:
    - max_jours: 30
      points: 2
    - max_jours: 90
      points: 1

  telephone_disponible:
    points: 1

  montant_minimum:
    seuil: 100000
    points: 1

  labels:
    chaud: 7
    tiede: 4
    # en dessous de tiede = froid (3 niveaux stricts)

# Sources de prospection activees
prospection:
  sources:
    lindas:
      label: LINDAS (registre du commerce)
      enabled: true
      type: sparql
      endpoint: https://lindas.admin.ch/query
      cantons: [GE, VD, VS, NE, FR, JU]

    zefix:
      label: Zefix REST (registre complet)
      enabled: false  # En attente credentials
      type: rest
      requires_auth: true

    simap:
      label: SIMAP (marches publics)
      enabled: true
      type: scraper
      cantons: [GE, VD, VS, NE, FR, JU]

    search_ch:
      label: search.ch (annuaire)
      enabled: true
      type: enrichment
      requires_api_key: true

  # Detection de secteur a l'import
  secteur_keywords:
    construction: [construction, batiment, bau, genie civil]
    architecture: [architecte, architecture, architektur]
    hvac: [chauffage, ventilation, climatisation, hvac, heizung]
    electricite: [electricite, elektro, electricien]
    renovation: [renovation, transformation, umbau]
    menuiserie: [menuiserie, charpente, schreinerei, zimmerei]
    ingenieur: [ingenieur, bureau technique, ingenieurbuero]
    regie: [regie, facility, immobilier, verwaltung]

# Signaux d'affaires : types configures
signaux:
  types:
    - key: appel_offres
      label: Appel d'offres
    - key: permis_construire
      label: Permis de construire
    - key: creation_entreprise
      label: Creation d'entreprise
    - key: demenagement
      label: Demenagement
    - key: expansion
      label: Expansion
    - key: fusion_acquisition
      label: Fusion / Acquisition
    - key: autre
      label: Autre

# Navigation sidebar
navigation:
  primary:
    - href: /
      label: Dashboard
      icon: dashboard
    - href: /contacts
      label: Contacts
      icon: contacts
    - href: /entreprises
      label: Entreprises
      icon: business
    - href: /pipeline
      label: Pipeline
      icon: filter_list
    - href: /prospection
      label: Prospection
      icon: search
    - href: /signaux
      label: Signaux
      icon: notifications
  secondary:
    - href: /aide
      label: Aide
      icon: help_outline

# Cron jobs
cron:
  alertes:
    path: /api/cron/alertes
    schedule: "0 7 * * *"
