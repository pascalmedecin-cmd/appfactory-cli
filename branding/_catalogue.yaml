# Catalogue de themes AppFactory
# Source : StyleTemplates.js (ancien AppFactory v1), selection des 5 meilleurs
# Utilise par /start option 3 pour proposer un point de depart branding

themes:
  standard:
    nom: Standard
    ambiance: "Warm-neutral, professionnel et lisible. Fond creme, touches bronze."
    style: "Polyvalent, convient a la majorite des apps metier"
    couleurs:
      primary: "#4A6B84"
      primary_hover: "#3B5A72"
      accent: "#C08B5C"
      background: "#FDFBF8"
      surface: "#F7F3EE"
      surface_raised: "#F0EBE4"
      text_primary: "#3A332A"
      text_body: "#4A4239"
      status:
        success: "#4ade80"
        warning: "#fb923c"
        danger: "#f87171"
        info: "#60a5fa"
    typographie:
      font: Inter
      mono: Fira Code
      font_url: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400&display=swap"

  dark-tech:
